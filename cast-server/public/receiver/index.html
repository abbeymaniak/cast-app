<!DOCTYPE html>
<html>
<head>
    <title>TV Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: "Helvetica Neue", helvetica, arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .status-container {
            text-align: center;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p.subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #b3b3b3;
            margin: 0;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            background-color: #000;
            z-index: 1;
        }

        /* When video is playing, hide the status text and show the video */
        .playing .status-container {
            display: none;
        }

        .playing #player {
            display: block;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #b3b3b3;
            border-top-color: #1ed760;
            border-radius: 50%;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px auto;
            display: none;
        }

        @-webkit-keyframes spin {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading .loader {
            display: block;
        }

        /* Custom subtitle overlay — works on all smart TV browsers */
        #subtitle-overlay {
            position: absolute;
            bottom: 8%;
            left: 0;
            right: 0;
            z-index: 9999;
            text-align: center;
            display: none;
            padding: 0 10%;
        }

        .playing #subtitle-overlay {
            display: block;
        }

        #subtitle-text {
            display: inline;
            background-color: rgba(0, 0, 0, 0.80);
            color: #ffffff;
            font-size: 28px;
            font-family: "Helvetica Neue", helvetica, arial, sans-serif;
            font-weight: 700;
            padding: 8px 16px;
            line-height: 1.6;
            -webkit-box-decoration-break: clone;
            box-decoration-break: clone;
        }
    </style>
</head>
<body>
    <div class="status-container" id="status-container">
        <div class="loader" id="loader"></div>
        <h2 id="heading">Ready to Cast</h2>
        <p class="subtitle" id="subtext">Select a video from your device to begin playing.</p>
    </div>

    <video id="player" controls autoplay width="100%"></video>

    <!-- Custom subtitle overlay for smart TV compatibility -->
    <div id="subtitle-overlay">
        <span id="subtitle-text"></span>
    </div>

    <!-- Cache-bust: v3 forces smart TV to reload the latest script -->
    <script src="/receiver/player.js?v=3"></script>
</body>
</html>
