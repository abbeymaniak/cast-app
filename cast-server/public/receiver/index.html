<!DOCTYPE html>
<html>
<head>
    <title>TV Player</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-base: #ffffff;
            --text-secondary: #b3b3b3;
            --spotify-green: #1ed760;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-base);
            font-family: "CircularSp", "Helvetica Neue", helvetica, arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .status-container {
            text-align: center;
            transition: opacity 0.5s ease;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.04em;
        }

        p.subtitle {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-secondary);
            margin: 0;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            background-color: #000;
        }

        /* When video is playing, we fade out the background status */
        .playing .status-container {
            display: none;
        }

        .playing #player {
            display: block;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid var(--text-secondary);
            border-top-color: var(--spotify-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading .loader {
            display: block;
        }

    </style>
</head>
<body>
    <div class="status-container" id="status-container">
        <div class="loader" id="loader"></div>
        <h2 id="heading">Ready to Cast</h2>
        <p class="subtitle" id="subtext">Select a video from your device to begin playing.</p>
    </div>

    <video id="player" controls autoplay width="100%"></video>

    <script src="/receiver/player.js"></script>
</body>
</html>
